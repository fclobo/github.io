
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lista Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#FDFAF5;font-family:'DM Sans',sans-serif;color:#2C1810}
input,button{font-family:inherit}
input:focus{outline:none}
button:active{opacity:.82}

#app{min-height:100vh;padding-bottom:90px}

header{background:#3E2723;color:white;padding:18px 16px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,.28)}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between}
.hdr-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.hdr-sub{font-size:12px;opacity:.6;margin-top:3px;text-transform:capitalize}
.hdr-badge{background:#FF8A65;color:white;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;white-space:nowrap;margin-top:2px;display:none}

.content{padding:16px;max-width:540px;margin:0 auto}

.sec-card{background:white;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;border-left:4px solid}
.sec-emoji{font-size:18px;line-height:1;flex-shrink:0}
.sec-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;flex:1;color:#2C1810}
.sec-badge{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;white-space:nowrap;transition:background .2s,color .2s}

/* items */
.item-wrap+.item-wrap{border-top:1px solid #F5F0E8}
.item-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s}
.item-row:active{background:#F9F6F1}

/* checkbox */
.cb{width:24px;height:24px;border-radius:6px;flex-shrink:0;border:2px solid #D4C5B0;background:white;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.on{border-color:var(--ac);background:var(--ac)}
.cb svg{display:none}
.cb.on svg{display:block}
.item-lbl{font-size:14.5px;line-height:1.4;color:#2C1810;flex:1;transition:all .15s}
.item-lbl.on{color:#B0A090;text-decoration:line-through}

/* stepper */
.stepper{display:flex;align-items:center;flex-shrink:0;border:1.5px solid #E0D8D0;border-radius:8px;overflow:hidden;height:32px}
.step-btn{width:32px;height:32px;border:none;background:transparent;font-size:19px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ac);line-height:1;transition:background .1s;flex-shrink:0}
.step-btn:active{background:#F5F0E8}
.step-num{min-width:34px;text-align:center;font-size:14px;font-weight:500;color:#2C1810;border-left:1px solid #E0D8D0;border-right:1px solid #E0D8D0;padding:0 2px;line-height:30px;flex-shrink:0}
.step-num.blank{color:#C0B0A0;font-weight:400;font-size:16px}

/* observation */
.obs-row{padding:0 16px 11px 52px;display:flex;align-items:center;gap:7px}
.obs-icon{font-size:12px;opacity:.4;flex-shrink:0;line-height:1}
.obs-input{flex:1;border:none;border-bottom:1px solid #E8E0D8;font-size:13px;color:#8B7355;padding:3px 0;background:transparent;font-family:'DM Sans',sans-serif;transition:border-color .15s,color .15s}
.obs-input::placeholder{color:#C8B9A8}
.obs-input:focus{border-bottom-color:var(--ac);color:#2C1810}

/* add row */
.add-row{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#999;opacity:.8;transition:opacity .15s;border-top:1px solid #F5F0E8}
.add-row:active{opacity:1}
.add-plus{font-size:20px;font-weight:300;line-height:1}
.add-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #F5F0E8}
.add-input{flex:1;border-radius:8px;padding:9px 12px;font-size:14px;background:white;color:#2C1810;border:1.5px solid #ccc;font-family:'DM Sans',sans-serif}
.add-input::placeholder{color:#C8B9A8}
.btn-ok{color:white;border:none;border-radius:8px;padding:9px 16px;font-size:15px;cursor:pointer;flex-shrink:0}
.btn-x{background:#EEE8E0;color:#888;border:none;border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer;flex-shrink:0}

/* bottom bar */
#bbar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #EDE7DE;padding:10px 14px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(0,0,0,.09);z-index:100}
#main-bar,#confirm-bar{display:flex;gap:10px;width:100%;align-items:center}
#confirm-bar{display:none}
.btn-week{background:#F5F0E8;color:#8B7355;border:none;border-radius:10px;padding:12px 14px;font-size:12.5px;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.btn-email{background:#1565C0;color:white;border:none;border-radius:10px;padding:12px 0;font-size:13px;cursor:pointer;font-weight:500;flex:1;transition:background .2s}
.btn-email:disabled{background:#9BB0CC;cursor:not-allowed}
.btn-pdf{background:#3E2723;color:white;border:none;border-radius:10px;padding:12px 0;font-size:13px;cursor:pointer;font-weight:500;flex:1}
.conf-txt{flex:1;font-size:13px;color:#8B7355}
.btn-no{background:#EEE;border:none;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;flex-shrink:0}
.btn-yes{background:#C0392B;color:white;border:none;border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-weight:500;flex-shrink:0}

/* search */
.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-search-btn{background:rgba(255,255,255,.15);border:none;color:white;border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.hdr-search-btn.active{background:rgba(255,255,255,.32)}
.search-bar{overflow:hidden;max-height:0;transition:max-height .25s,padding .25s;padding:0 16px}
.search-bar.open{max-height:60px;padding:10px 16px 2px}
.search-input{width:100%;border:none;border-radius:10px;padding:9px 14px;font-size:14px;background:rgba(255,255,255,.15);color:white;font-family:'DM Sans',sans-serif}
.search-input::placeholder{color:rgba(255,255,255,.45)}
.search-input:focus{outline:none;background:rgba(255,255,255,.22)}
.item-hidden{display:none}

/* item menu */
.item-menu-btn{background:none;border:none;color:#C8B9A8;font-size:20px;padding:4px 6px;cursor:pointer;flex-shrink:0;line-height:1;border-radius:6px;transition:color .1s}
.item-menu-btn:active{color:#8B7355}
.item-menu{margin:0 12px 10px;background:white;border:1px solid #EDE7DE;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.1);overflow:hidden}
.menu-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;cursor:pointer;color:#2C1810;border:none;background:none;width:100%;text-align:left;transition:background .1s}
.menu-opt:active{background:#F9F6F1}
.menu-opt+.menu-opt{border-top:1px solid #F5F0E8}
.menu-opt.danger{color:#C0392B}

/* edit inline */
.edit-input-row{display:flex;gap:8px;padding:8px 14px 8px 52px;background:#FDFAF5;border-top:1px solid #F5F0E8}
.edit-input{flex:1;border-radius:8px;padding:8px 12px;font-size:14px;background:white;color:#2C1810;border:1.5px solid #ccc;font-family:'DM Sans',sans-serif}

#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#2C1810;color:white;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}

/* ── PRINT ── */
@media print{
  #app,#bbar,#toast{display:none!important}
  #pview{display:block!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:0;size:A4}
  #pview{padding:14mm 18mm}
}
#pview{display:none;font-family:Georgia,serif;color:#1a1a1a;font-size:14px;line-height:1.5}
.p-header{text-align:center;border-bottom:2.5px solid #2C1810;padding-bottom:14px;margin-bottom:22px}
.p-title{font-size:26px;font-weight:700;letter-spacing:.3px}
.p-date{font-size:13px;color:#666;margin-top:5px;text-transform:capitalize}
.p-body{display:block}
.p-sec{margin-bottom:44px;break-inside:avoid}
.p-sec-title{font-size:15px;font-weight:700;border-bottom:1px solid #bbb;padding-bottom:5px;margin-bottom:9px}
.p-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
.p-item{display:flex;align-items:flex-start;padding:6px 0;border-bottom:1px dotted #ddd;break-inside:avoid}
.p-item:last-child{border-bottom:none}
.p-info{flex:1}
.p-name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.p-txt{font-size:20px}
.p-qty-prefix{font-size:20px;font-weight:700;color:#333;margin-right:4px;flex-shrink:0}
.p-obs{font-size:13px;color:#777;font-style:italic;margin-top:3px}
.p-footer{margin-top:28px;font-size:11px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}
</style>
</head>
<body>

<div id="pview">
  <div class="p-header">
    <div class="p-title">Lista Semanal</div>
    <div class="p-date" id="p-date"></div>
  </div>
  <div id="p-content"></div>
  <div class="p-footer">Gerado em <span id="p-dt"></span></div>
</div>

<div id="app">
  <header>
    <div class="hdr-row">
      <div>
        <div class="hdr-title">Lista Semanal</div>
        <div class="hdr-sub" id="hdr-date"></div>
      </div>
      <div class="hdr-actions">
        <button class="hdr-search-btn" id="btn-search" onclick="toggleSearch()" title="Buscar">🔍</button>
        <div class="hdr-badge" id="hdr-badge"></div>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <input class="search-input" id="search-input" type="search" placeholder="Buscar item em todas as seções…" oninput="onSearch(this.value)">
    </div>
  </header>
  <div class="content" id="secs"></div>
</div>

<div id="bbar">
  <div id="main-bar">
    <button class="btn-week" onclick="askClear()">🔄 Nova semana</button>
    <button class="btn-email" id="btn-email" onclick="doEmail()" disabled>📧 Enviar</button>
    <button class="btn-pdf" id="btn-pdf" onclick="doPDF()">🖨️ PDF</button>
  </div>
  <div id="confirm-bar">
    <span class="conf-txt">Limpar seleção desta semana?</span>
    <button class="btn-no" onclick="cancelClear()">Não</button>
    <button class="btn-yes" onclick="doClear()">Limpar</button>
  </div>
</div>

<div id="toast"></div>

<script>
const SKEY='lista_lobo_v9';

const DEFAULTS=[
  {id:'refeicoes',emoji:'🍽️',title:'Refeições a Preparar',ac:'#C0392B',bg:'#FFF8F6',hasQty:false,items:[
    {name:'Arroz do Fernando'},

    {name:'Arroz Doce'},

    {name:'Torta salgada – carne moída, tomate, cebola e salsinha',obs:'Colocar uma cenoura ralada'},
    {name:'Mandioca cozida'},
    {name:'Mandioca frita'},

    {name:'Pinhão cozido'},

    {name:'Passar as calças'},
    {name:'Comidinha Malu',obs:'Mix de legumes + ração + pedacinho de carne'},
    {name:'Comidinha Odin',obs:'Patê + pedacinho de carne + pedacinho de batata doce e ração'}
  ]},
  {id:'tarefas',emoji:'✅',title:'Tarefas a Fazer',ac:'#2E7D32',bg:'#F6FBF6',hasQty:false,items:[
    {name:'Trocar as águas'},{name:'Trocar os Tapetes'},
    {name:'Deixar as luzes acesas'},{name:'Deixar o ar ligado'},
    {name:'Aspirar o Banheiro e a Sala'}
  ]},
  {id:'mercado',emoji:'🛒',title:'Itens do Mercado',ac:'#1565C0',bg:'#F5F8FF',hasQty:true,items:[
    {name:'Arroz do Fernando',qty:0},{name:'Arroz Branco',qty:0},{name:'Feijão',qty:0},
    {name:'Couve-Flor',qty:3},{name:'Brócolis',qty:3},
    {name:'Cenoura',qty:2},{name:'Cenoura Baby',qty:3},{name:'Cenoura pra salada',qty:0},
    {name:'Mandioca',qty:1},{name:'Batatinha',qty:0},{name:'Batata Doce',qty:1},
    {name:'Cebola Branca',qty:0},{name:'Cebola Roxa',qty:0},
    {name:'Tomate',qty:2},{name:'Tomatinho Cereja',qty:1},{name:'Salada pro almoço',qty:0},
    {name:'Azeitona preta',qty:1},{name:'Azeitona verde sem caroço',qty:1},{name:'Azeitona Verde',qty:1},
    {name:'Limão',qty:0},{name:'Salsinha',qty:1},{name:'Cebolinha',qty:1},{name:'Alho',qty:1},
    {name:'Ovos',qty:0},{name:'Ovos de Codorna',qty:1},
    {name:'Iogurte Activa zero Morango',qty:2},{name:'Iogurte Natural Nestlé',qty:2},
    {name:'Danoninho',qty:0},{name:'Gelatina',qty:2,obs:'Framboesa'},

    {name:'Leite Condensado Zero Lactose',qty:0},{name:'Coco Ralado',qty:0},

    {name:'Wafer Chocolate',qty:0},{name:'Wafer Morango',qty:0},{name:'Wafer Avelã',qty:0},
    {name:'Bala Arcor',qty:5,obs:'Menta 3, Pistache 3, Caramelo Salgado 1, Leite 3'},
    {name:'Stiksy Palitinho Salgado',qty:1},{name:'Pingo Douro Salgadinho',qty:1},
    {name:'Batatinha Palha',qty:0},{name:'Brinquedos Odin',qty:0},
    {name:'Papel Toalha',qty:0},{name:'Papel Alumínio',qty:0},{name:'Palito de dente',qty:0},
    {name:'Filtro de Papel 103',qty:1},
    {name:'Sal',qty:1},{name:'Sal grosso',qty:1},
    {name:'Vela',qty:4},{name:'Fósforo',qty:2},
    {name:'Saco de lixo verde reciclável',qty:1}
  ]},
  {id:'sacolao',emoji:'🥬',title:'Itens do Sacolão',ac:'#558B2F',bg:'#F7FBF4',hasQty:true,items:[
    {name:'Banana Verde',qty:3},{name:'Banana Madura',qty:5},
    {name:'Abacaxi',qty:1,obs:'Fatiado'},{name:'Goiaba verde',qty:3},
    {name:'Pera Portuguesa',qty:3},{name:'Manga verde',qty:1},
    {name:'Abacate Maduro',qty:1},{name:'Abacate Verde',qty:1},
    {name:'Morango',qty:1},{name:'Uva Verde',qty:1},
    {name:'Caqui',qty:4},{name:'Ponkã',qty:8},{name:'Ameixa',qty:3}
  ]},
  {id:'acougue',emoji:'🥩',title:'Itens do Açougue',ac:'#B71C1C',bg:'#FFF5F5',hasQty:false,items:[
    {name:'Medalhão de Filé Mignon (2 dedos)',obs:'15 medalhão de 2 dedos de espessura. Separar uma bandeija com 10 e uma com 5'},
    {name:'Filé Mignon pra estrogonofe',obs:'350 gramas'},
    {name:'Filé de Frango pra Strogonoff'},
    {name:'Carne Moída de Primeira',obs:'400 gramas'},
    {name:'Posta Vermelha para panela',obs:'700 gramas corta pra panela e sem gordura'}
  ]}
];

let secs=[],ck={},adding=null,searchQ='',menuOpen=null,editing=null;

function load(){
  try{
    const r=localStorage.getItem(SKEY);
    if(r){const d=JSON.parse(r);secs=d.secs||clone(DEFAULTS);ck=d.ck||{};}
    else{secs=clone(DEFAULTS);ck={};}
  }catch{secs=clone(DEFAULTS);ck={};}
}
function save(){try{localStorage.setItem(SKEY,JSON.stringify({secs,ck}));}catch{}}
function clone(x){return JSON.parse(JSON.stringify(x))}
function K(sid,i){return sid+'_'+i}
function getSt(key,dq,dobs){return ck[key]||{on:false,qty:dq!==undefined?dq:0,obs:dobs||''}}
function totalOn(){return Object.values(ck).filter(s=>s&&s.on).length}
function ckSecs(){
  return secs.map(sec=>({
    ...sec,
    items:sec.items.map((item,i)=>({item,st:ck[K(sec.id,i)]}))
      .filter(({st})=>st&&st.on)
      .map(({item,st})=>({...item,qty:st.qty,obs:st.obs}))
  })).filter(s=>s.items.length>0);
}

function mkSVG(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width','13');svg.setAttribute('height','10');
  svg.setAttribute('viewBox','0 0 13 10');svg.setAttribute('fill','none');
  const p=document.createElementNS(ns,'path');
  p.setAttribute('d','M1 5L5 9L12 1');p.setAttribute('stroke','white');
  p.setAttribute('stroke-width','2.2');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
  svg.appendChild(p);return svg;
}
function mk(tag,cls,txt){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}

function render(){
  const scrollY=window.scrollY;
  renderHdr();
  renderSecs();
  window.scrollTo(0,scrollY);
}

function renderHdr(){
  document.getElementById('hdr-date').textContent=
    new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const n=totalOn();
  const b=document.getElementById('hdr-badge');
  b.style.display=n>0?'block':'none';
  b.textContent=n+' item'+(n!==1?'ns':'');
  document.getElementById('btn-email').disabled=n===0;
}

function toggleSearch(){
  const bar=document.getElementById('search-bar');
  const btn=document.getElementById('btn-search');
  const inp=document.getElementById('search-input');
  const open=bar.classList.toggle('open');
  btn.classList.toggle('active',open);
  if(open){setTimeout(()=>inp.focus(),260);}
  else{inp.value='';onSearch('');}
}
function onSearch(v){
  searchQ=v.toLowerCase().trim();
  menuOpen=null;editing=null;
  renderSecs();
}
function deleteItem(sid,i){
  if(!confirm('Excluir este item permanentemente?'))return;
  const sec=secs.find(s=>s.id===sid);
  sec.items.splice(i,1);
  const newCk={};
  Object.entries(ck).forEach(([k,v])=>{
    if(!k.startsWith(sid+'_')){newCk[k]=v;return;}
    const idx=parseInt(k.split('_')[1]);
    if(idx===i)return;
    const ni=idx>i?idx-1:idx;
    newCk[sid+'_'+ni]=v;
  });
  ck=newCk;menuOpen=null;editing=null;
  save();render();
}
function startEdit(sid,i){menuOpen=null;editing={sid,i};renderSecs();}
function confirmEdit(sid,i,val){
  const v=val.trim();
  if(v){secs.find(s=>s.id===sid).items[i].name=v;save();}
  editing=null;render();
}

function renderSecs(){
  const container=document.getElementById('secs');
  container.innerHTML='';
  secs.forEach(sec=>{
    const visibleIdx=sec.items.map((item,i)=>({item,i}))
      .filter(({item})=>!searchQ||item.name.toLowerCase().includes(searchQ));
    if(searchQ&&visibleIdx.length===0)return;

    const nOn=sec.items.filter((_,i)=>{const s=ck[K(sec.id,i)];return s&&s.on;}).length;
    const card=mk('div','sec-card');

    const hdr=mk('div','sec-hdr');
    hdr.style.cssText='background:'+sec.bg+';border-left-color:'+sec.ac;
    hdr.appendChild(mk('span','sec-emoji',sec.emoji));
    hdr.appendChild(mk('span','sec-title',sec.title));
    const badge=mk('span','sec-badge',nOn+'/'+sec.items.length);
    badge.style.background=nOn>0?sec.ac:'#E8E0D8';
    badge.style.color=nOn>0?'white':'#999';
    hdr.appendChild(badge);
    card.appendChild(hdr);

    visibleIdx.forEach(({item,i})=>{
      const key=K(sec.id,i);
      const st=getSt(key,item.qty||0,item.obs||'');
      const isOn=st.on;
      const isMenuOpen=menuOpen&&menuOpen.sid===sec.id&&menuOpen.i===i;
      const isEditing=editing&&editing.sid===sec.id&&editing.i===i;
      const wrap=mk('div','item-wrap');

      if(isEditing){
        const er=mk('div','edit-input-row');
        er.onclick=e=>e.stopPropagation();
        const ei=mk('input','edit-input');
        ei.type='text';ei.value=item.name;ei.style.borderColor=sec.ac;
        const ok=mk('button','btn-ok','\u2713');ok.style.background=sec.ac;
        const x=mk('button','btn-x','\u2715');
        ok.onclick=()=>confirmEdit(sec.id,i,ei.value);
        x.onclick=()=>{editing=null;renderSecs();};
        ei.onkeydown=e=>{if(e.key==='Enter')confirmEdit(sec.id,i,ei.value);if(e.key==='Escape'){editing=null;renderSecs();}};
        er.appendChild(ei);er.appendChild(ok);er.appendChild(x);
        wrap.appendChild(er);
        card.appendChild(wrap);
        setTimeout(()=>{ei.focus();ei.select();},30);
        return;
      }

      const row=mk('div','item-row');
      row.onclick=()=>{if(menuOpen){menuOpen=null;renderSecs();return;}toggle(sec.id,i);};

      const cb=mk('div','cb'+(isOn?' on':''));
      cb.style.setProperty('--ac',sec.ac);
      if(isOn)cb.appendChild(mkSVG());
      row.appendChild(cb);
      row.appendChild(mk('span','item-lbl'+(isOn?' on':''),item.name));

      if(sec.hasQty&&isOn){
        const stp=mk('div','stepper');
        stp.style.setProperty('--ac',sec.ac);
        stp.onclick=e=>e.stopPropagation();
        const minus=mk('button','step-btn','\u2212');minus.style.setProperty('--ac',sec.ac);
        minus.onclick=e=>{e.stopPropagation();decQty(sec.id,i);};
        const blank=st.qty===0;
        const numEl=mk('span','step-num'+(blank?' blank':''),blank?'\u2014':String(st.qty));
        const plus=mk('button','step-btn','+');plus.style.setProperty('--ac',sec.ac);
        plus.onclick=e=>{e.stopPropagation();incQty(sec.id,i);};
        stp.appendChild(minus);stp.appendChild(numEl);stp.appendChild(plus);
        row.appendChild(stp);
      }

      const mBtn=mk('button','item-menu-btn','\u22ef');
      mBtn.onclick=e=>{e.stopPropagation();menuOpen=isMenuOpen?null:{sid:sec.id,i};renderSecs();};
      row.appendChild(mBtn);
      wrap.appendChild(row);

      if(isOn){
        const obsRow=mk('div','obs-row');
        obsRow.onclick=e=>e.stopPropagation();
        const inp=mk('input','obs-input');
        inp.type='text';inp.placeholder='Observa\u00e7\u00e3o opcional...';
        inp.value=st.obs||'';inp.style.setProperty('--ac',sec.ac);
        inp.oninput=function(){
          const cur=ck[key]||{on:true,qty:0,obs:''};
          ck[key]={...cur,obs:this.value};save();
        };
        obsRow.appendChild(mk('span','obs-icon','\ud83d\udcdd'));
        obsRow.appendChild(inp);
        wrap.appendChild(obsRow);
      }

      if(isMenuOpen){
        const menu=mk('div','item-menu');
        const edit=mk('button','menu-opt','\u270f\ufe0f  Renomear');
        edit.onclick=e=>{e.stopPropagation();startEdit(sec.id,i);};
        const del=mk('button','menu-opt danger','\ud83d\uddd1\ufe0f  Excluir item');
        del.onclick=e=>{e.stopPropagation();deleteItem(sec.id,i);};
        menu.appendChild(edit);menu.appendChild(del);
        wrap.appendChild(menu);
      }

      card.appendChild(wrap);
    });

    if(!searchQ){
      if(adding===sec.id){
        const ir=mk('div','add-input-row');
        const inp=mk('input','add-input');
        inp.type='text';inp.placeholder='Nome do item...';inp.style.borderColor=sec.ac;
        const ok=mk('button','btn-ok','\u2713');ok.style.background=sec.ac;
        const x=mk('button','btn-x','\u2715');
        const doAdd=()=>{
          const v=inp.value.trim();
          if(v){sec.items.push({name:v,qty:sec.hasQty?0:undefined});save();}
          adding=null;render();
        };
        ok.onclick=doAdd;
        x.onclick=()=>{adding=null;renderSecs();};
        inp.onkeydown=e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape')x.onclick();};
        ir.appendChild(inp);ir.appendChild(ok);ir.appendChild(x);
        card.appendChild(ir);
        setTimeout(()=>inp.focus(),30);
      } else {
        const ar=mk('div','add-row');
        ar.style.color=sec.ac;
        ar.appendChild(mk('span','add-plus','+'));
        ar.appendChild(mk('span','','Adicionar item'));
        ar.onclick=()=>{adding=sec.id;renderSecs();};
        card.appendChild(ar);
      }
    }

    container.appendChild(card);
  });
}
function toggle(sid,i){
  const key=K(sid,i);
  const sec=secs.find(s=>s.id===sid);
  const item=sec.items[i];
  const cur=ck[key]||{on:false,qty:item.qty||0,obs:item.obs||''};
  if(!cur.on){
    const sq=cur.qty>0?cur.qty:(item.qty||0);
    ck[key]={on:true,qty:sq,obs:cur.obs||item.obs||''};
  } else {
    ck[key]={...cur,on:false};
  }
  save();render();
}

function incQty(sid,i){
  const key=K(sid,i);
  const cur=ck[key]||{on:true,qty:0,obs:''};
  ck[key]={...cur,qty:cur.qty+1};
  save();renderSecs();renderHdr();
}

function decQty(sid,i){
  const key=K(sid,i);
  const cur=ck[key];if(!cur)return;
  ck[key]={...cur,qty:Math.max(0,cur.qty-1)};
  save();renderSecs();renderHdr();
}

function askClear(){
  document.getElementById('main-bar').style.display='none';
  document.getElementById('confirm-bar').style.display='flex';
}
function cancelClear(){
  document.getElementById('main-bar').style.display='flex';
  document.getElementById('confirm-bar').style.display='none';
}
function doClear(){ck={};save();cancelClear();render();toast('Seleção limpa ✓');}

function toast(msg,ms=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.style.opacity='0',ms);
}

function doEmail(){
  const cs=ckSecs();if(!cs.length)return;
  const btn=document.getElementById('btn-email');
  btn.disabled=true;btn.textContent='⏳ Enviando...';
  const dt=new Date().toLocaleDateString('pt-BR');
  const dtSubj=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
  let body='Lista Semanal – '+dt+'\n\n';
  cs.forEach(s=>{
    body+=s.emoji+' '+s.title+'\n';
    s.items.forEach(it=>{
      let line='  • '+it.name;
      if(it.qty&&(typeof it.qty==='string'?it.qty.trim():it.qty>0))
        line=' '+it.qty+' '+it.name;
      body+=line+'\n';
      if(it.obs)body+='    Obs: '+it.obs+'\n';
    });
    body+='\n';
  });

  const controller=new AbortController();
  const timeout=setTimeout(()=>{
    controller.abort();
    toast('Tempo esgotado – verifique conexão ou template');
    btn.textContent='📧 Enviar';btn.disabled=false;
  },20000);

  fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',
    signal:controller.signal,
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      service_id:'service_d3x9a68',
      template_id:'template_himx50j',
      user_id:'UyCblsC5-ctggBwAR',
      template_params:{
        subject:'Lista Semanal – '+dtSubj,
        body:body,
        name:'Lista Semanal',
        message:body,
        title:'Lista Semanal – '+dtSubj
      }
    })
  }).then(r=>{
    clearTimeout(timeout);
    if(r.ok){
      toast('E-mail enviado! ✓');
    } else {
      r.text().then(t=>toast('Erro '+r.status+': '+t));
    }
    btn.textContent='📧 Enviar';btn.disabled=false;
  }).catch(err=>{
    clearTimeout(timeout);
    if(err.name!=='AbortError'){
      toast('Erro: '+err.message);
      btn.textContent='📧 Enviar';btn.disabled=false;
    }
  });
}

function doPDF(){
  const cs=ckSecs();
  if(!cs.length){toast('Selecione itens primeiro');return;}

  const btn=document.getElementById('btn-pdf');
  btn.disabled=true;btn.textContent='⏳ Gerando...';

  if(!window.jspdf){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>gerarPDF(cs,btn);
    s.onerror=()=>{toast('Erro ao carregar jsPDF');btn.disabled=false;btn.textContent='🖨️ PDF';};
    document.head.appendChild(s);
  } else {
    gerarPDF(cs,btn);
  }
}

function gerarPDF(cs,btn){
  const {jsPDF}=window.jspdf;
  const doc=buildDoc(cs);
  const blob=doc.output('blob');
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank');
  btn.disabled=false;btn.textContent='🖨️ PDF';
  toast('PDF gerado! ✓');
}

function buildDoc(cs){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,ML=20,MR=20,MT=20;
  const col=W-ML-MR;
  const col2=(col-10)/2;
  const LINE_H=5.5;

  const dtObj=new Date();
  const dt=dtObj.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const dtStr=dt.charAt(0).toUpperCase()+dt.slice(1);

  // IDs que ficam na página "Tarefas de Casa" (coluna única)
  const HOME_IDS=['refeicoes','tarefas'];

  function drawPageHeader(title){
    let y=MT;
    doc.setFont('times','bold');doc.setFontSize(22);doc.setTextColor(30);
    doc.text(title,W/2,y,{align:'center'});y+=8;
    doc.setDrawColor(60,30,20);doc.setLineWidth(0.6);
    doc.line(ML,y,W-MR,y);y+=10;
    doc.setTextColor(30);
    return y;
  }

  // Renderiza os itens de uma seção num layout de coluna(s)
  function drawSection(sec, y, singleCol){
    const colW = singleCol ? col : col2;
    const numCols = singleCol ? 1 : 2;
    const xDivider = ML + col2 + 5; // x da linha divisória central

    // título da seção
    if(y>260){doc.addPage();y=MT;}
    doc.setFont('times','bold');doc.setFontSize(13);doc.setTextColor(30);
    doc.text(sec.title,ML,y);y+=2;
    doc.setDrawColor(180);doc.setLineWidth(0.3);
    doc.line(ML,y,W-MR,y);y+=7;

    const items=sec.items;
    const rows=singleCol?items.length:Math.ceil(items.length/2);
    const sectionStartY=y;

    for(let r=0;r<rows;r++){
      if(y>275){doc.addPage();y=MT;}

      // calcular altura da linha
      let rowH=7;
      for(let c=0;c<numCols;c++){
        const idx=singleCol?r:r+c*rows;
        if(idx>=items.length)continue;
        const item=items[idx];
        let label=item.name;
        const hasQty=item.qty&&(typeof item.qty==='string'?item.qty.trim():item.qty>0);
        if(hasQty)label=(typeof item.qty==='string'?item.qty:item.qty)+' '+item.name;
        doc.setFont('times','normal');doc.setFontSize(13);
        const lines=doc.splitTextToSize(label,colW);
        let h=lines.length*LINE_H;
        if(item.obs){
          const obsLines=doc.splitTextToSize('- '+item.obs,colW);
          h+=obsLines.length*LINE_H;
        }
        rowH=Math.max(rowH,h+2);
      }

      // renderizar
      for(let c=0;c<numCols;c++){
        const idx=singleCol?r:r+c*rows;
        if(idx>=items.length)continue;
        const item=items[idx];
        const x=ML+c*(col2+10);
        let label=item.name;
        const hasQty=item.qty&&(typeof item.qty==='string'?item.qty.trim():item.qty>0);
        if(hasQty)label=(typeof item.qty==='string'?item.qty:item.qty)+' '+item.name;
        doc.setFont('times','normal');doc.setFontSize(13);doc.setTextColor(30);
        const lines=doc.splitTextToSize(label,colW);
        doc.text(lines,x,y);
        if(item.obs){
          const obsLines=doc.splitTextToSize('- '+item.obs,colW);
          doc.setTextColor(30);
          doc.text(obsLines,x,y+lines.length*LINE_H);
        }
      }

      y+=rowH;
      doc.setDrawColor(210);doc.setLineWidth(0.2);
      doc.setLineDashPattern([0.5,1.5],0);
      doc.line(ML,y-1,W-MR,y-1);
      doc.setLineDashPattern([],0);
    }

    // linha vertical divisória entre colunas (só layout 2 colunas)
    if(!singleCol){
      doc.setDrawColor(180);doc.setLineWidth(0.3);
      doc.setLineDashPattern([],0);
      doc.line(xDivider,sectionStartY-5,xDivider,y-10);
    }

    return y+10;
  }

  // ── Página 1: Tarefas de Casa (coluna única) ──────────────────────────────
  const homeSecs=cs.filter(s=>HOME_IDS.includes(s.id));
  const shopSecs=cs.filter(s=>!HOME_IDS.includes(s.id));

  let y=drawPageHeader('Tarefas de Casa');
  homeSecs.forEach(sec=>{ y=drawSection(sec,y,true); });

  // ── Página 2: Lista do Mercado (duas colunas) ─────────────────────────────
  if(shopSecs.length){
    doc.addPage();
    y=drawPageHeader('Lista do Mercado');
    shopSecs.forEach(sec=>{ y=drawSection(sec,y,false); });
  }

  return doc;
}

function doEmail(){
  const cs=ckSecs();
  if(!cs.length){toast('Selecione itens primeiro');return;}
  const btn=document.getElementById('btn-email');
  btn.disabled=true;btn.textContent='⏳ Gerando...';

  if(!window.jspdf){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>enviarEmail(cs,btn);
    s.onerror=()=>{toast('Erro ao carregar jsPDF');btn.disabled=false;btn.textContent='📧 Enviar';};
    document.head.appendChild(s);
  } else {
    enviarEmail(cs,btn);
  }
}

function enviarEmail(cs,btn){
  const dtObj=new Date();
  const dtFile=dtObj.toLocaleDateString('pt-BR').replace(/\//g,'-');
  const dtSubj=dtObj.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});

  let emailBody='Lista Semanal – '+dtObj.toLocaleDateString('pt-BR')+'\n\n';
  cs.forEach(s=>{
    emailBody+=s.emoji+' '+s.title+'\n';
    s.items.forEach(it=>{
      const hasQty=it.qty&&(typeof it.qty==='string'?it.qty.trim():it.qty>0);
      let line=hasQty?(typeof it.qty==='string'?it.qty:it.qty)+' '+it.name:'• '+it.name;
      emailBody+=line+'\n';
      if(it.obs)emailBody+='  Obs: '+it.obs+'\n';
    });
    emailBody+='\n';
  });

  // Anexa JSON completo do secs para atualização do código
  emailBody+='\n\n――――――――――――――――――――――――――――――――\n';
  emailBody+='JSON DA LISTA (para atualização do código)\n';
  emailBody+='――――――――――――――――――――――――――――――――\n';
  emailBody+=JSON.stringify(secs,null,2);

  const doc=buildDoc(cs);
  const pdfBase64=doc.output('datauristring').split(',')[1];

  btn.textContent='📤 Enviando...';

  const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxUXcyEzCfArkPZgab4J4VAUe43fFj1880UZ9hG311xIxQaTJiFmLSkSFlLClDpGKEw/exec';

  fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({pdf:pdfBase64,date:dtFile,subject:'Lista Semanal – '+dtSubj,body:emailBody})
  }).then(r=>r.json()).then(data=>{
    if(data.ok){toast('E-mail enviado com PDF! ✓',3500);}
    else{toast('Erro: '+data.error);}
    btn.disabled=false;btn.textContent='📧 Enviar';
  }).catch(err=>{
    toast('Erro: '+err.message);
    btn.disabled=false;btn.textContent='📧 Enviar';
  });
}
